name: Sync Test
on: workflow_dispatch

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          remove-dotnet: true
          remove-android: true
          remove-haskell: true

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Init manifest
        run: |
          mkdir fox_12.1 && cd fox_12.1
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --depth=1

      - name: Add local manifest (remove rust)
        run: |
          mkdir -p fox_12.1/.repo/local_manifests
          cat > fox_12.1/.repo/local_manifests/remove.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <remove-project name="platform/prebuilts/rust" />
          </manifest>
          EOF

      - name: Sync source
        run: |
          cd fox_12.1
          repo sync -c -j4 --force-sync --no-clone-bundle --no-tags

      - name: Clone device tree
        run: |
          cd fox_12.1/device
          mkdir -p infinix
          git clone https://github.com/transsion-mt6789-recovery/twrp-device_infinix_Infinix-X6880.git infinix/Infinix-X6880

      - name: Check disk usage
        run: df -h

      - name: Lunch and build recovery
        run: |
          cd fox_12.1
          source build/envsetup.sh
          lunch twrp_X6880-eng
          mka recoveryimage -j4

      - name: Find output image
        run: |
          find fox_12.1/out/target/product/X6880 -maxdepth 1 -iname "*.img"

      - name: Upload recovery image
        uses: actions/upload-artifact@v4
        with:
          name: recovery-image
          path: fox_12.1/out/target/product/X6880/*.img
